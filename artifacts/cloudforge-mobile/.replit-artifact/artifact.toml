kind = "mobile"
previewPath = "/mobile/"
title = "CloudForge Mobile"
version = "1.0.0"
id = "artifacts/cloudforge-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 25289

[services.development]
run = "pnpm --filter @workspace/cloudforge-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cloudforge-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/cloudforge-mobile", "run", "serve" ]

[services.env]
PORT = "25289"
BASE_PATH = "/mobile/"
